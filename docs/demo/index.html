<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDGA Scoreboard &mdash; Discraft presents Throw Down the Mountain XIV - Weekend 1</title>
    <link
      rel="stylesheet"
      href="theme.css"
    />
    <style>
      html, body { min-height: 100vh; }
      .page { max-width: 900px; margin: 0 auto; padding: 48px 24px 80px; }

      .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 48px; }
      .header-left h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 42px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; line-height: 1; color: var(--text); }
      .header-left h1 span { color: var(--accent); }
      .header-left p { margin-top: 8px; font-size: 14px; color: var(--text2); font-weight: 300; letter-spacing: 0.5px; }

      .theme-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; user-select: none; }
      .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
      .theme-toggle .icon { font-size: 16px; }

      .section-title { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 24px; transition: background 0.3s, border-color 0.3s; }

      .search-wrap { position: relative; margin-bottom: 12px; }
      .search-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
      #search { width: 100%; padding: 12px 14px 12px 42px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
      #search:focus { border-color: var(--accent); }
      #search::placeholder { color: var(--muted); }

      .tier-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
      .tier-pill { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
      .tier-pill:hover { border-color: var(--accent); color: var(--accent); }
      .tier-pill.active { background: var(--accent); border-color: var(--accent); color: #000; }

      #events-list { max-height: 340px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); }
      #events-list::-webkit-scrollbar { width: 6px; }
      #events-list::-webkit-scrollbar-track { background: transparent; }
      #events-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

      .event-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; gap: 14px; }
      .event-item:last-child { border-bottom: none; }
      .event-item:hover { background: var(--hover-bg); }
      .event-item.selected { background: var(--selected-bg); }
      .event-item .tier-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 1px; padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--text2); white-space: nowrap; flex-shrink: 0; }
      .event-item.selected .tier-badge { background: var(--accent); color: #000; }
      .event-item .event-info { flex: 1; min-width: 0; }
      .event-item .event-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .event-item .event-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
      .event-item .event-dates { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
      .events-loading, .events-empty { padding: 32px; text-align: center; color: var(--muted); font-size: 14px; }

      #selected-summary { display: none; margin-top: 16px; padding: 14px 18px; background: var(--selected-bg); border: 1px solid var(--accent-dim); border-radius: 8px; font-size: 14px; color: var(--text); }
      #selected-summary strong { color: var(--accent); }

      .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
      @media (max-width: 560px) { .settings-grid { grid-template-columns: 1fr; } }
      .setting-group label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; }

      .slider-wrap { display: flex; align-items: center; gap: 12px; }
      input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--border2); outline: none; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); cursor: pointer; transition: transform 0.15s; }
      input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
      .slider-val { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); min-width: 52px; text-align: right; }

      .div-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
      .div-check { display: flex; align-items: center; gap: 6px; cursor: pointer; }
      .div-check input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
      .div-check span { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--text2); }

      #launch-btn { display: block; width: 100%; padding: 18px; margin-top: 8px; background: var(--accent); color: #000; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
      #launch-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
      #launch-btn:active:not(:disabled) { transform: translateY(0); }
      #launch-btn:disabled { opacity: 0.35; cursor: not-allowed; }
      .launch-hint { text-align: center; margin-top: 10px; font-size: 12px; color: var(--muted); }

       .snapshot-note { text-align: center; margin-top: 24px; font-size:
12px; color: var(--muted); } .snapshot-note a { color: var(--accent); } 
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div class="header-left">
          <h1>&#x1F94F; PDGA <span>Scoreboard</span></h1>
          <p>
            Configure display settings, then launch the scoreboard.
          </p>
        </div>
        <div
          class="theme-toggle"
          id="theme-toggle"
          title="Toggle dark/light mode"
        >
          <span class="icon" id="theme-icon">&#x2600;&#xFE0F;</span>
          <span id="theme-label">Light</span>
        </div>
      </div>

      <!-- Tournament section -->
      <div class="card">
        <div class="section-title">
          1 &#x2014; Tournament
        </div>
        
<div id="events-list">
  <div class="event-item selected">
    <span class="tier-badge" id="event-tier">?</span>
    <div class="event-info">
      <div class="event-name" id="event-name-el"></div>
      <div class="event-meta" id="event-meta-el"></div>
    </div>
    <span class="event-dates" id="event-dates-el"></span>
  </div>
</div>

      </div>

      <!-- Settings -->
      <div class="card">
        <div class="section-title">2 &#x2014; Display Settings</div>
        <div class="settings-grid">
          <div class="setting-group">
            <label>Scroll Speed</label>
            <div class="slider-wrap">
              <input
                type="range"
                id="scroll-speed"
                min="10"
                max="150"
                step="5"
                value="60"
              />
              <span class="slider-val" id="scroll-speed-val">60 px/s</span>
            </div>
          </div>

          <div class="setting-group">
            <label>Refresh Interval</label>
            <div class="slider-wrap">
              <input
                type="range"
                id="poll-interval"
                min="10"
                max="120"
                step="5"
                value="30"
              />
              <span class="slider-val" id="poll-interval-val">30s</span>
            </div>
          </div>

          <div class="setting-group" style="grid-column: 1 / -1">
            <label
              >Divisions to Show
              <span
                style="color: var(--muted); font-weight: 400; letter-spacing: 0"
                >(leave all checked to show all)</span
              ></label
            >
            <div class="div-grid" id="div-grid">
              
            </div>
          </div>
        </div>
      </div>

      <button
        id="launch-btn"
        
      >
        Launch Scoreboard
      </button>
      <p class="launch-hint">
        Opens the scoreboard in this tab. Press F11 on the TV for fullscreen.
      </p>
      
<p class="snapshot-note">
  &#x1F4F8; Snapshot &mdash;
  <a href="https://github.com/forrest22/disc-golf-event-buddy">github.com/forrest22/disc-golf-event-buddy</a>
</p>

    </div>

    <script src="landing.js"></script>
    <script>
      
const EVENT = {
  "tournId": "98453",
  "officialName": "Discraft presents Throw Down the Mountain XIV - Weekend 1",
  "tier": "?",
  "city": "",
  "stateProvince": "",
  "countryISO": "",
  "startDate": "",
  "endDate": "2026-03-08"
}; const DIVS = [
  {
    "code": "MPO",
    "name": "Mixed Pro Open"
  },
  {
    "code": "FPO",
    "name": "Women's Pro Open"
  },
  {
    "code": "MP40",
    "name": "Mixed Pro 40+"
  },
  {
    "code": "MP50",
    "name": "Mixed Pro 50+"
  },
  {
    "code": "MP55",
    "name": "Mixed Pro 55+"
  },
  {
    "code": "MP60",
    "name": "Mixed Pro 60+"
  },
  {
    "code": "MP65",
    "name": "Mixed Pro 65+"
  },
  {
    "code": "MP70",
    "name": "Mixed Pro 70+"
  }
];
const start = fmtDate(EVENT.startDate); const end = fmtDate(EVENT.endDate);
document.getElementById("event-tier").textContent = EVENT.tier || "?";
document.getElementById("event-name-el").textContent = EVENT.officialName || "";
document.getElementById("event-meta-el").textContent = [EVENT.city,
EVENT.stateProvince, EVENT.countryISO].filter(Boolean).join(", ");
document.getElementById("event-dates-el").textContent = start === end ? start : start + " \u2013 " + end;
renderDivisionCheckboxes(DIVS);
document.getElementById("launch-btn").addEventListener("click", () => {
Cookies.set("divisionFilter", [...divisionFilter]); window.location.href =
"scoreboard.html"; }); 
    </script>
  </body>
</html>
