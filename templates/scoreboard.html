<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDGA Live Scoreboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0a0e14;
        --surface: #111720;
        --border: #1e2a38;
        --accent: #00c896;
        --accent-dim: #007a5c;
        --red: #ff4d4d;
        --gold: #f5c842;
        --silver: #a8b8c8;
        --bronze: #cd7f3a;
        --text: #e8edf3;
        --muted: #5a6a7a;
        --header-h: 72px;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Barlow", sans-serif;
        overflow: hidden;
      }

      /* ── Header ── */
      #header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--header-h);
        background: linear-gradient(
          90deg,
          #0d1520 0%,
          #112233 60%,
          #0d1520 100%
        );
        border-bottom: 2px solid var(--accent);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 36px;
        z-index: 100;
      }

      #header .logo-area {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      #header .disc-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        box-shadow: 0 0 16px rgba(0, 200, 150, 0.4);
      }

      #event-name {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--text);
      }

      #event-round {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 2px;
      }

      #header .right {
        text-align: right;
      }

      #live-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--red);
        color: #fff;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        padding: 4px 10px;
        border-radius: 4px;
        text-transform: uppercase;
      }

      #live-badge .dot {
        width: 7px;
        height: 7px;
        background: #fff;
        border-radius: 50%;
        animation: blink 1.2s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.2;
        }
      }

      #last-updated {
        font-size: 12px;
        color: var(--muted);
        margin-top: 4px;
      }

      /* ── Scroll viewport ── */
      #scroll-viewport {
        position: fixed;
        top: var(--header-h);
        left: 0;
        right: 0;
        bottom: 0;
        overflow: hidden;
      }

      #scroll-track {
        display: flex;
        flex-direction: column;
        will-change: transform;
      }

      /* ── Division block ── */
      .division {
        padding: 28px 40px 12px;
      }

      .division-header {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--accent);
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
        margin-bottom: 6px;
      }

      /* ── Score table ── */
      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead th {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
        padding: 6px 10px;
        text-align: left;
      }

      thead th.num {
        text-align: right;
      }

      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.2s;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      tbody td {
        padding: 10px 10px;
        font-size: 17px;
      }

      /* Place column */
      td.place {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 15px;
        font-weight: 700;
        width: 48px;
        color: var(--muted);
      }

      td.place.p1 {
        color: var(--gold);
      }
      td.place.p2 {
        color: var(--silver);
      }
      td.place.p3 {
        color: var(--bronze);
      }

      /* Name column */
      td.name {
        font-weight: 500;
        font-size: 18px;
      }

      /* Score column */
      td.score {
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 800;
        font-size: 22px;
        text-align: right;
        width: 90px;
      }

      td.score.under {
        color: var(--accent);
      }
      td.score.over {
        color: var(--red);
      }
      td.score.even {
        color: var(--muted);
      }

      /* Round score column */
      td.round-score {
        font-family: "Barlow Condensed", sans-serif;
        font-weight: 700;
        font-size: 17px;
        text-align: right;
      }

      /* Thru column */
      td.thru {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        color: var(--muted);
        text-align: right;
        width: 56px;
      }

      /* Country badge */
      span.country {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        color: var(--muted);
        background: var(--border);
        border-radius: 3px;
        padding: 1px 5px;
        margin-left: 8px;
        vertical-align: middle;
      }

      /* ── Gap spacer between divisions ── */
      .spacer {
        height: 24px;
      }

      /* ── Loading state ── */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 24px;
        letter-spacing: 4px;
        color: var(--muted);
        text-transform: uppercase;
        z-index: 200;
      }

      /* ── Pause overlay (mouse move) ── */
      #paused-badge {
        position: fixed;
        bottom: 20px;
        right: 28px;
        background: rgba(0, 0, 0, 0.7);
        color: var(--muted);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        letter-spacing: 2px;
        padding: 6px 14px;
        border-radius: 4px;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.4s;
        pointer-events: none;
      }
      #paused-badge.visible {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading scores…</div>

    <!-- Header -->
    <div id="header">
      <div class="logo-area">
        <div class="disc-icon">🥏</div>
        <div>
          <div id="event-name">Loading event…</div>
          <div id="event-round"></div>
        </div>
      </div>
      <div class="right">
        <div id="live-badge"><span class="dot"></span> Live</div>
        <div id="last-updated">Fetching…</div>
      </div>
    </div>

    <!-- Scrolling content -->
    <div id="scroll-viewport">
      <div id="scroll-track"></div>
    </div>

    <div id="paused-badge">⏸ Scroll paused</div>

    <script>
      const POLL_MS = 30_000; // re-fetch every 30 seconds
      const SCROLL_PX_S = 60; // pixels per second scroll speed
      const PAUSE_AFTER_MOUSE_MS = 3000; // resume N ms after last mouse move

      let scrollY = 0;
      let paused = false;
      let lastMouseMove = 0;
      let lastRender = null;
      let totalHeight = 0;
      let vpHeight = 0;

      const track = document.getElementById("scroll-track");
      const viewport = document.getElementById("scroll-viewport");
      const loading = document.getElementById("loading");
      const pausedBadge = document.getElementById("paused-badge");

      // ── Fetch & render ────────────────────────────────────────
      async function fetchAndRender() {
        try {
          const res = await fetch("/scores");
          const data = await res.json();
          renderScores(data);
          document.getElementById("last-updated").textContent =
            data.last_updated ? `Updated ${data.last_updated}` : "";
          loading.style.display = "none";
        } catch (e) {
          console.error("Score fetch failed:", e);
        }
      }

      function renderScores(data) {
        document.getElementById("event-name").textContent =
          data.event_name || "PDGA Event";
        document.getElementById("event-round").textContent =
          data.event_round || "";

        track.innerHTML = "";

        (data.divisions || []).forEach((div) => {
          // Division header
          const header = document.createElement("div");
          header.className = "division";
          header.innerHTML = `
          <div class="division-header">${div.name} &mdash; ${div.round ? "Rd " + div.round : ""}</div>
          <table>
            <thead>
              <tr>
                <th style="width:52px">#</th>
                <th>Player</th>
                <th class="num" style="width:80px">Total</th>
                <th class="num" style="width:72px">Round</th>
                <th class="num" style="width:56px">Thru</th>
              </tr>
            </thead>
            <tbody>
              ${div.players
                .map(
                  (p) => `
                <tr>
                  <td class="place ${p.place === 1 ? "p1" : p.place === 2 ? "p2" : p.place === 3 ? "p3" : ""}">
                    ${p.place === 1 ? "🥇" : p.place === 2 ? "🥈" : p.place === 3 ? "🥉" : p.place_display}
                  </td>
                  <td class="name">
                    ${p.name}
                    ${p.country ? `<span class="country">${p.country}</span>` : ""}
                  </td>
                  <td class="score ${scoreClass(p.score)}">${p.score_display}</td>
                  <td class="round-score ${scoreClass(p.score)}" style="opacity:0.65">${p.round_score}</td>
                  <td class="thru">${p.thru}</td>
                </tr>
              `,
                )
                .join("")}
            </tbody>
          </table>
        `;
          track.appendChild(header);

          const spacer = document.createElement("div");
          spacer.className = "spacer";
          track.appendChild(spacer);
        });

        // Duplicate content for seamless loop
        const clone = track.innerHTML;
        track.innerHTML += clone;

        vpHeight = viewport.clientHeight;
        totalHeight = track.scrollHeight / 2; // half because duplicated
      }

      function scoreClass(score) {
        if (score < 0) return "under";
        if (score > 0) return "over";
        return "even";
      }

      // ── Smooth scroll loop ────────────────────────────────────
      function scrollLoop(ts) {
        if (lastRender !== null && !paused) {
          const delta = (ts - lastRender) / 1000; // seconds
          scrollY += SCROLL_PX_S * delta;

          // Seamless loop: when we've scrolled one full copy, jump back
          if (totalHeight > 0 && scrollY >= totalHeight) {
            scrollY -= totalHeight;
          }

          track.style.transform = `translateY(-${scrollY}px)`;
        }

        // Auto-resume after mouse idle
        if (paused && Date.now() - lastMouseMove > PAUSE_AFTER_MOUSE_MS) {
          paused = false;
          pausedBadge.classList.remove("visible");
        }

        lastRender = ts;
        requestAnimationFrame(scrollLoop);
      }

      // ── Mouse pause ───────────────────────────────────────────
      document.addEventListener("mousemove", () => {
        lastMouseMove = Date.now();
        paused = true;
        pausedBadge.classList.add("visible");
      });

      // ── Init ──────────────────────────────────────────────────
      fetchAndRender();
      setInterval(fetchAndRender, POLL_MS);
      requestAnimationFrame(scrollLoop);
    </script>
  </body>
</html>
