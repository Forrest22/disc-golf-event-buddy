<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PDGA Live Scoreboard{% endblock %}</title>
  <link rel="stylesheet" href="{% block theme_css_path %}/static/theme.css{% endblock %}" />
  <style>
    /* ── Scoreboard-specific variables not in theme.css ── */
    :root {
      --header-h: 72px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    /* Light mode header override */
    html.light #header {
      background: linear-gradient(90deg, #e0e8f0 0%, #d0dce8 60%, #e0e8f0 100%);
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: linear-gradient(90deg, #0d1520 0%, #112233 60%, #0d1520 100%);
      border-bottom: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      z-index: 100;
    }

    #header .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #header .disc-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 16px rgba(0, 200, 150, 0.4);
    }

    #event-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
    }

    #event-round {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    #header .right {
      text-align: right;
    }

    /* ── Header right-top row: Live · Dark/Light · Settings ── */
    .right-top {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    #live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--red);
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    #live-badge .dot {
      width: 7px;
      height: 7px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    /* Shared pill-button style for theme toggle and settings link */
    #theme-btn,
    #back-link {
      display: inline-block;
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 3px 8px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }

    #theme-btn:hover,
    #back-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    #last-updated {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    #cache-badge {
      color: var(--gold);
      font-weight: 600;
      margin-right: 2px;
    }

    /* ── Scroll viewport ── */
    #scroll-viewport {
      position: fixed;
      top: var(--header-h);
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
    }

    #scroll-track {
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    /* ── Division block ── */
    .division {
      padding: 28px 40px 12px;
    }

    .division-header {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      margin-bottom: 6px;
    }

    /* ── Score table ── */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 10px;
      text-align: left;
    }

    thead th.num {
      text-align: right;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    tbody tr:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    tbody td {
      padding: 10px 10px;
      font-size: 17px;
    }

    /* Place column */
    td.place {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      width: 48px;
      color: var(--muted);
    }

    td.place.p1 {
      color: var(--gold);
    }

    td.place.p2 {
      color: var(--silver);
    }

    td.place.p3 {
      color: var(--bronze);
    }

    /* Name column */
    td.name {
      font-weight: 500;
      font-size: 18px;
    }

    /* Score column */
    td.score {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 22px;
      text-align: right;
      width: 90px;
    }

    td.score.under {
      color: var(--accent);
    }

    td.score.over {
      color: var(--red);
    }

    td.score.even {
      color: var(--muted);
    }

    /* Round and Thru columns — identical typography */
    td.round-score,
    td.thru {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 17px;
      text-align: right;
      color: var(--muted);
    }

    td.round-score {
      width: 72px;
    }

    td.thru {
      width: 56px;
    }

    td.dnf {
      color: var(--muted) !important;
      opacity: 1 !important;
    }

    /* Country badge */
    span.country {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--muted);
      background: var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ── Gap spacer between divisions ── */
    .spacer {
      height: 24px;
    }

    /* ── Loading state ── */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      z-index: 200;
    }

    /* ── Pause overlay (mouse move) ── */
    #paused-badge {
      position: fixed;
      bottom: 20px;
      right: 28px;
      background: rgba(0, 0, 0, 0.75);
      color: #a0b8cc;
      /* fixed light color — badge bg is always dark */
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 4px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    #paused-badge.visible {
      opacity: 1;
    }

      {
      % block extra_css %
    }

      {
      % endblock %
    }
  </style>
</head>

<body>

  <div id="loading">Loading scores…</div>

  <!-- Header -->
  <div id="header">
    <div class="logo-area">
      <div class="disc-icon">🥏</div>
      <div>
        <div id="event-name">Loading event…</div>
        <div id="event-round"></div>
      </div>
    </div>
    <div class="right">
      <div class="right-top">
        {% block header_badges %}
        <div id="live-badge"><span class="dot"></span> Live</div>
        <button id="theme-btn">☀️ Light</button>
        <a href="/" id="back-link">⚙ Settings</a>
        {% endblock %}
      </div>
      <div id="last-updated">{% block last_updated_text %}Fetching…{% endblock %}</div>
    </div>
  </div>

  <!-- Scrolling content -->
  <div id="scroll-viewport">
    <div id="scroll-track"></div>
  </div>

  <div id="paused-badge">⏸ Scroll paused</div>
  {% block extra_html %}{% endblock %}

  <script src="{% block scoreboard_js_src %}/static/scoreboard.js{% endblock %}"></script>
  <script>
    {% block data_js %} {% endblock %}
    {% block fetch_js %} fetchAndRender(); {% endblock %}
    {% block init_js %} {% endblock %}
  </script>
</body>

</html>
