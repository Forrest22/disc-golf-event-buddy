<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDGA Scoreboard — Setup</title>
    <link rel="stylesheet" href="/static/theme.css" />
    <style>
      /* ── Landing-specific overrides not in theme.css ── */
      html,
      body {
        min-height: 100vh;
      }

      /* ── Layout ── */
      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 48px 24px 80px;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 48px;
      }

      .header-left h1 {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 42px;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        line-height: 1;
        color: var(--text);
      }

      .header-left h1 span {
        color: var(--accent);
      }

      .header-left p {
        margin-top: 8px;
        font-size: 14px;
        color: var(--text2);
        font-weight: 300;
        letter-spacing: 0.5px;
      }

      /* Dark mode toggle */
      .theme-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 8px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text2);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: all 0.2s;
        user-select: none;
      }

      .theme-toggle:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .theme-toggle .icon {
        font-size: 16px;
      }

      /* ── Section titles ── */
      .section-title {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 16px;
      }

      /* ── Card ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px;
        margin-bottom: 24px;
        transition:
          background 0.3s,
          border-color 0.3s;
      }

      /* ── Search bar ── */
      .search-wrap {
        position: relative;
        margin-bottom: 12px;
      }

      .search-wrap .icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--muted);
        font-size: 16px;
        pointer-events: none;
      }

      #search {
        width: 100%;
        padding: 12px 14px 12px 42px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: "Barlow", sans-serif;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }

      #search:focus {
        border-color: var(--accent);
      }
      #search::placeholder {
        color: var(--muted);
      }

      /* Tier filter pills */
      .tier-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
      }

      .tier-pill {
        padding: 4px 12px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text2);
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
      }

      .tier-pill:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .tier-pill.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #000;
      }

      /* Events list */
      #events-list {
        max-height: 340px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card-bg);
      }

      #events-list::-webkit-scrollbar {
        width: 6px;
      }
      #events-list::-webkit-scrollbar-track {
        background: transparent;
      }
      #events-list::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 3px;
      }

      .event-item {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.15s;
        gap: 14px;
      }

      .event-item:last-child {
        border-bottom: none;
      }
      .event-item:hover {
        background: var(--hover-bg);
      }
      .event-item.selected {
        background: var(--selected-bg);
      }

      .event-item .tier-badge {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 1px;
        padding: 2px 7px;
        border-radius: 4px;
        background: var(--surface2);
        color: var(--text2);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .event-item.selected .tier-badge {
        background: var(--accent);
        color: #000;
      }

      .event-item .event-info {
        flex: 1;
        min-width: 0;
      }

      .event-item .event-name {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .event-item .event-meta {
        font-size: 12px;
        color: var(--text2);
        margin-top: 2px;
      }

      .event-item .event-dates {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
        flex-shrink: 0;
      }

      .events-loading,
      .events-empty {
        padding: 32px;
        text-align: center;
        color: var(--muted);
        font-size: 14px;
      }

      /* Selected event summary */
      #selected-summary {
        display: none;
        margin-top: 16px;
        padding: 14px 18px;
        background: var(--selected-bg);
        border: 1px solid var(--accent-dim);
        border-radius: 8px;
        font-size: 14px;
        color: var(--text);
      }

      #selected-summary strong {
        color: var(--accent);
      }

      /* ── Settings grid ── */
      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      @media (max-width: 560px) {
        .settings-grid {
          grid-template-columns: 1fr;
        }
      }

      .setting-group label {
        display: block;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text2);
        margin-bottom: 10px;
      }

      /* Slider */
      .slider-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 2px;
        background: var(--border2);
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        transition: transform 0.15s;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }

      .slider-val {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
        min-width: 52px;
        text-align: right;
      }

      /* Division checkboxes */
      .div-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        gap: 8px;
      }

      .div-check {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }

      .div-check input[type="checkbox"] {
        accent-color: var(--accent);
        width: 15px;
        height: 15px;
        cursor: pointer;
      }

      .div-check span {
        font-family: "Barlow Condensed", sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: var(--text2);
      }

      /* ── Launch button ── */
      #launch-btn {
        display: block;
        width: 100%;
        padding: 18px;
        margin-top: 8px;
        background: var(--accent);
        color: #000;
        font-family: "Barlow Condensed", sans-serif;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 3px;
        text-transform: uppercase;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.1s;
      }

      #launch-btn:hover:not(:disabled) {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      #launch-btn:active:not(:disabled) {
        transform: translateY(0);
      }
      #launch-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .launch-hint {
        text-align: center;
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      /* ── Divider ── */
      .divider {
        height: 1px;
        background: var(--border);
        margin: 28px 0;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <h1>🥏 PDGA <span>Scoreboard</span></h1>
          <p>
            Select a tournament and configure display settings, then launch the
            scoreboard.
          </p>
        </div>
        <div
          class="theme-toggle"
          id="theme-toggle"
          title="Toggle dark/light mode"
        >
          <span class="icon" id="theme-icon">☀️</span>
          <span id="theme-label">Light</span>
        </div>
      </div>

      <!-- Tournament Picker -->
      <div class="card">
        <div class="section-title">1 — Select Tournament</div>

        <div class="search-wrap">
          <span class="icon">🔍</span>
          <input
            type="text"
            id="search"
            placeholder="Search by name, city, or state…"
            autocomplete="off"
          />
        </div>

        <div class="tier-filters" id="tier-filters">
          <button class="tier-pill active" data-tier="ALL">All Tiers</button>
        </div>

        <div id="events-list">
          <div class="events-loading">Loading current events…</div>
        </div>

        <div id="selected-summary"></div>
      </div>

      <!-- Settings -->
      <div class="card">
        <div class="section-title">2 — Display Settings</div>

        <div class="settings-grid">
          <!-- Scroll Speed -->
          <div class="setting-group">
            <label>Scroll Speed</label>
            <div class="slider-wrap">
              <input
                type="range"
                id="scroll-speed"
                min="10"
                max="150"
                step="5"
                value="60"
              />
              <span class="slider-val" id="scroll-speed-val">60 px/s</span>
            </div>
          </div>

          <!-- Poll Interval -->
          <div class="setting-group">
            <label>Refresh Interval</label>
            <div class="slider-wrap">
              <input
                type="range"
                id="poll-interval"
                min="10"
                max="120"
                step="5"
                value="30"
              />
              <span class="slider-val" id="poll-interval-val">30s</span>
            </div>
          </div>

          <!-- Divisions -->
          <div class="setting-group" style="grid-column: 1 / -1">
            <label
              >Divisions to Show
              <span
                style="color: var(--muted); font-weight: 400; letter-spacing: 0"
                >(leave all checked to show all)</span
              ></label
            >
            <div class="div-grid" id="div-grid">
              <!-- populated after tournament is selected -->
              <span style="color: var(--muted); font-size: 13px"
                >Select a tournament first…</span
              >
            </div>
          </div>
        </div>
      </div>

      <!-- Launch -->
      <button id="launch-btn" disabled>Launch Scoreboard</button>
      <p class="launch-hint">
        Opens the scoreboard in this tab. Press F11 on the TV for fullscreen.
      </p>
    </div>

    <script>
      // ── Cookie helpers ────────────────────────────────────────────
      const Cookies = {
        set(name, value, days = 365) {
          const expires = new Date(Date.now() + days * 864e5).toUTCString();
          document.cookie = `${name}=${encodeURIComponent(JSON.stringify(value))}; expires=${expires}; path=/`;
        },
        get(name, fallback = null) {
          const match = document.cookie.match(
            new RegExp(`(?:^|; )${name}=([^;]*)`),
          );
          if (!match) return fallback;
          try {
            return JSON.parse(decodeURIComponent(match[1]));
          } catch {
            return fallback;
          }
        },
      };

      // ── State ─────────────────────────────────────────────────────
      let allEvents = [];
      let selectedEvent = null;
      let activeTierFilter = "ALL";
      const divisionFilter = new Set(); // codes of divisions to SHOW (empty = all)

      // ── Theme ─────────────────────────────────────────────────────
      function applyTheme(light) {
        document.body.classList.toggle("light", light);
        document.getElementById("theme-icon").textContent = light ? "🌙" : "☀️";
        document.getElementById("theme-label").textContent = light
          ? "Dark"
          : "Light";
        Cookies.set("theme", light ? "light" : "dark");
      }

      // Load saved theme
      applyTheme(Cookies.get("theme", "dark") === "light");

      document.getElementById("theme-toggle").addEventListener("click", () => {
        applyTheme(!document.body.classList.contains("light"));
      });

      // ── Load settings from cookies ────────────────────────────────
      const savedSpeed = Cookies.get("scrollSpeed", 60);
      const savedPoll = Cookies.get("pollInterval", 30);
      const savedDivs = Cookies.get("divisionFilter", []);

      document.getElementById("scroll-speed").value = savedSpeed;
      document.getElementById("scroll-speed-val").textContent =
        `${savedSpeed} px/s`;
      document.getElementById("poll-interval").value = savedPoll;
      document.getElementById("poll-interval-val").textContent =
        `${savedPoll}s`;

      // Restore saved division filter into the Set
      (savedDivs || []).forEach((d) => divisionFilter.add(d));

      // ── Slider live update ────────────────────────────────────────
      document.getElementById("scroll-speed").addEventListener("input", (e) => {
        const v = parseInt(e.target.value);
        document.getElementById("scroll-speed-val").textContent = `${v} px/s`;
        Cookies.set("scrollSpeed", v);
      });

      document
        .getElementById("poll-interval")
        .addEventListener("input", (e) => {
          const v = parseInt(e.target.value);
          document.getElementById("poll-interval-val").textContent = `${v}s`;
          Cookies.set("pollInterval", v);
        });

      // ── Fetch events from our API ─────────────────────────────────
      async function loadEvents() {
        try {
          const res = await fetch("/api/events");
          const json = await res.json();
          allEvents = json.data || [];
          buildTierFilters();
          renderEvents();
        } catch (e) {
          document.getElementById("events-list").innerHTML =
            `<div class="events-empty">Failed to load events. Is the server running?</div>`;
        }
      }

      // ── Tier filter pills ─────────────────────────────────────────
      function buildTierFilters() {
        const tiers = [
          ...new Set(allEvents.map((e) => e.tier).filter(Boolean)),
        ].sort();
        const wrap = document.getElementById("tier-filters");
        wrap.innerHTML = `<button class="tier-pill active" data-tier="ALL">All Tiers</button>`;
        tiers.forEach((t) => {
          const btn = document.createElement("button");
          btn.className = "tier-pill";
          btn.dataset.tier = t;
          btn.textContent = t;
          wrap.appendChild(btn);
        });
        wrap.addEventListener("click", (e) => {
          const btn = e.target.closest(".tier-pill");
          if (!btn) return;
          activeTierFilter = btn.dataset.tier;
          wrap
            .querySelectorAll(".tier-pill")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          renderEvents();
        });
      }

      // ── Render filtered event list ────────────────────────────────
      function renderEvents() {
        const query = document
          .getElementById("search")
          .value.toLowerCase()
          .trim();
        const list = document.getElementById("events-list");

        const filtered = allEvents.filter((ev) => {
          const tierMatch =
            activeTierFilter === "ALL" || ev.tier === activeTierFilter;
          const searchStr =
            `${ev.officialName} ${ev.city} ${ev.state} ${ev.countryISO}`.toLowerCase();
          const queryMatch = !query || searchStr.includes(query);
          return tierMatch && queryMatch;
        });

        if (!filtered.length) {
          list.innerHTML = `<div class="events-empty">No events match your search.</div>`;
          return;
        }

        list.innerHTML = filtered
          .map((ev) => {
            const start = fmtDate(ev.startDate);
            const end = fmtDate(ev.endDate);
            const dates = start === end ? start : `${start} – ${end}`;
            const loc = [ev.city, ev.state, ev.countryISO]
              .filter(Boolean)
              .join(", ");
            const sel = selectedEvent && selectedEvent.tournId === ev.tournId;
            return `
        <div class="event-item ${sel ? "selected" : ""}" data-id="${ev.tournId}">
          <span class="tier-badge">${ev.tier || "?"}</span>
          <div class="event-info">
            <div class="event-name">${ev.officialName}</div>
            <div class="event-meta">${loc}</div>
          </div>
          <span class="event-dates">${dates}</span>
        </div>`;
          })
          .join("");

        // Click to select
        list.querySelectorAll(".event-item").forEach((el) => {
          el.addEventListener("click", () =>
            selectEvent(parseInt(el.dataset.id)),
          );
        });
      }

      // ── Select a tournament ───────────────────────────────────────
      async function selectEvent(tournId) {
        selectedEvent = allEvents.find((e) => e.tournId === tournId) || null;
        if (!selectedEvent) return;

        renderEvents(); // re-render to show selection highlight
        updateSelectedSummary();

        // Fetch division list for this event to populate checkboxes
        try {
          const res = await fetch(`/api/event/${tournId}`);
          const json = await res.json();
          const divs = (json.data?.Divisions || []).map((d) => ({
            code: d.Division,
            name: d.AbbreviatedName || d.DivisionName || d.Division,
          }));
          renderDivisionCheckboxes(divs);
        } catch (e) {
          document.getElementById("div-grid").innerHTML =
            `<span style="color:var(--muted);font-size:13px;">Could not load divisions.</span>`;
        }

        document.getElementById("launch-btn").disabled = false;
      }

      function updateSelectedSummary() {
        const el = document.getElementById("selected-summary");
        if (!selectedEvent) {
          el.style.display = "none";
          return;
        }
        const loc = [
          selectedEvent.city,
          selectedEvent.state,
          selectedEvent.countryISO,
        ]
          .filter(Boolean)
          .join(", ");
        const start = fmtDate(selectedEvent.startDate);
        const end = fmtDate(selectedEvent.endDate);
        const dates = start === end ? start : `${start} – ${end}`;
        el.style.display = "block";
        el.innerHTML = `✅ <strong>${selectedEvent.officialName}</strong> &nbsp;·&nbsp; ${loc} &nbsp;·&nbsp; ${dates}`;
      }

      // ── Division checkboxes ───────────────────────────────────────
      function renderDivisionCheckboxes(divs) {
        const grid = document.getElementById("div-grid");
        if (!divs.length) {
          grid.innerHTML = `<span style="color:var(--muted);font-size:13px;">No divisions found.</span>`;
          return;
        }
        grid.innerHTML = divs
          .map((d) => {
            // If filter set is empty, all are "checked by default"
            const checked =
              divisionFilter.size === 0 || divisionFilter.has(d.code);
            return `
        <label class="div-check">
          <input type="checkbox" value="${d.code}" ${checked ? "checked" : ""} />
          <span>${d.code}</span>
        </label>`;
          })
          .join("");

        grid.querySelectorAll("input[type=checkbox]").forEach((cb) => {
          cb.addEventListener("change", () => {
            if (cb.checked) divisionFilter.add(cb.value);
            else divisionFilter.delete(cb.value);
            Cookies.set("divisionFilter", [...divisionFilter]);
          });
        });
      }

      // ── Launch scoreboard ─────────────────────────────────────────
      document
        .getElementById("launch-btn")
        .addEventListener("click", async () => {
          if (!selectedEvent) return;

          // Save division filter cookie (empty = show all)
          Cookies.set("divisionFilter", [...divisionFilter]);

          // Tell the server which tournament to scrape;
          // server returns the scoreboard URL with ?tournId= baked in
          const res = await fetch("/api/select", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ tournId: selectedEvent.tournId }),
          });
          const json = await res.json();

          // Navigate to /scoreboard?tournId=<id>
          window.location.href =
            json.url || `/scoreboard?tournId=${selectedEvent.tournId}`;
        });

      // ── Search input ──────────────────────────────────────────────
      document.getElementById("search").addEventListener("input", renderEvents);

      // ── Date formatter ────────────────────────────────────────────
      function fmtDate(iso) {
        if (!iso) return "";
        const d = new Date(iso);
        return d.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          timeZone: "UTC",
        });
      }

      // ── Boot ──────────────────────────────────────────────────────
      loadEvents();
    </script>
  </body>
</html>
